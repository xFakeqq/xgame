<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ular Tangga Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --board-light: #F5E6C8;
            --board-dark: #C8A882;
            --snake-color: #2D8B4E;
            --snake-head: #1A6B35;
            --ladder-color1: #4A90D9;
            --accent-red: #E74C3C;
            --accent-gold: #F1C40F;
            --bg-primary: #1A1208;
            --bg-secondary: #2D2114;
            --text-primary: #FFF8E7;
            --text-muted: #A89070;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: 'Nunito', sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
        }
        .fredoka { font-family: 'Fredoka One', cursive; }

        .bg-pattern {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(200,168,130,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(74,144,217,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(45,139,78,0.06) 0%, transparent 50%),
                var(--bg-primary);
        }
        .floating-particle {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
            animation: floatUp linear infinite; opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; } 90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .screen {
            display: none; position: fixed; inset: 0; z-index: 1;
            flex-direction: column; align-items: center; justify-content: center;
            overflow-y: auto; overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        .screen.active { display: flex; animation: fadeIn 0.35s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .game-card {
            background: linear-gradient(145deg, rgba(45,33,20,0.94), rgba(26,18,8,0.97));
            border: 1px solid rgba(200,168,130,0.15);
            border-radius: 14px; backdrop-filter: blur(10px);
        }
        .game-input {
            background: rgba(0,0,0,0.3); border: 2px solid rgba(200,168,130,0.2);
            border-radius: 10px; padding: 11px 14px; color: var(--text-primary);
            font-family: 'Nunito', sans-serif; font-size: 15px; width: 100%;
            transition: border-color 0.3s, box-shadow 0.3s; outline: none;
            -webkit-appearance: none;
        }
        .game-input:focus { border-color: var(--accent-gold); box-shadow: 0 0 0 3px rgba(241,196,15,0.15); }
        .game-input::placeholder { color: var(--text-muted); }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-gold), #D4A10E);
            color: #1A1208; font-family: 'Fredoka One', cursive; font-size: 16px;
            padding: 12px 28px; border: none; border-radius: 12px; cursor: pointer;
            transition: transform 0.15s, box-shadow 0.3s, opacity 0.3s;
            box-shadow: 0 4px 15px rgba(241,196,15,0.3); position: relative; overflow: hidden;
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(241,196,15,0.4); }
        .btn-primary:active:not(:disabled) { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-primary .spinner {
            display: none; width: 18px; height: 18px;
            border: 3px solid rgba(26,18,8,0.3); border-top-color: #1A1208;
            border-radius: 50%; animation: spin 0.6s linear infinite; flex-shrink: 0;
        }
        .btn-primary.loading .spinner { display: block; }
        .btn-primary.loading .btn-text { opacity: 0.6; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-secondary {
            background: rgba(200,168,130,0.1); color: var(--text-primary);
            font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px;
            padding: 9px 20px; border: 2px solid rgba(200,168,130,0.2);
            border-radius: 10px; cursor: pointer; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 4px;
        }
        .btn-secondary:hover { background: rgba(200,168,130,0.2); border-color: rgba(200,168,130,0.4); }

        .dice-container {
            width: clamp(56px, 12vw, 80px); aspect-ratio: 1;
            perspective: 300px; cursor: pointer; margin: 0 auto;
        }
        .dice {
            width: 100%; height: 100%;
            background: linear-gradient(145deg, #FFF, #E8E8E8);
            border-radius: 14px; display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr);
            padding: 14%; gap: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.8);
        }
        .dice.rolling { animation: diceRoll 0.6s ease-out; }
        @keyframes diceRoll {
            0% { transform: rotateX(0) rotateZ(0) scale(0.8); }
            20% { transform: rotateX(180deg) rotateZ(90deg) scale(1.1); }
            40% { transform: rotateX(360deg) rotateZ(180deg) scale(0.95); }
            60% { transform: rotateX(540deg) rotateZ(270deg) scale(1.05); }
            80% { transform: rotateX(680deg) rotateZ(340deg) scale(1); }
            100% { transform: rotateX(720deg) rotateZ(360deg) scale(1); }
        }
        .dot { width: 100%; height: 100%; border-radius: 50%; background: transparent; transition: background 0.2s; }
        .dot.active { background: #2C2C2C; box-shadow: inset 0 2px 3px rgba(0,0,0,0.4); }

        .player-badge {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; border-radius: 10px; transition: all 0.3s; border: 2px solid transparent;
        }
        .player-badge.current { border-color: var(--accent-gold); background: rgba(241,196,15,0.08); box-shadow: 0 0 16px rgba(241,196,15,0.1); }
        .player-avatar {
            width: clamp(30px, 7vw, 40px); aspect-ratio: 1; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: clamp(13px, 3.5vw, 18px); color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3); flex-shrink: 0;
        }

        .room-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: rgba(0,0,0,0.2);
            border: 1px solid rgba(200,168,130,0.1); border-radius: 10px;
            cursor: pointer; transition: all 0.2s;
        }
        .room-item:hover { background: rgba(200,168,130,0.08); border-color: rgba(200,168,130,0.25); }

        .toast {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%) translateY(-120px);
            padding: 12px 22px; border-radius: 12px; font-weight: 700; z-index: 999;
            transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 8px 30px rgba(0,0,0,0.5); max-width: 90vw; text-align: center;
            font-size: 13px; white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.info { background: linear-gradient(135deg,#4A90D9,#3A7BC8); color: #fff; }
        .toast.success { background: linear-gradient(135deg,#27AE60,#1E8449); color: #fff; }
        .toast.warning { background: linear-gradient(135deg,var(--accent-gold),#D4A10E); color: #1A1208; }
        .toast.error { background: linear-gradient(135deg,#E74C3C,#C0392B); color: #fff; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.75);
            display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(6px);
        }
        .modal-overlay.active { display: flex; animation: fadeIn 0.4s ease; }
        .modal-content {
            background: linear-gradient(145deg, var(--bg-secondary), var(--bg-primary));
            border: 2px solid rgba(241,196,15,0.3); border-radius: 20px;
            padding: clamp(24px, 5vw, 40px); text-align: center; max-width: 380px; width: 88%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 80px rgba(241,196,15,0.1);
        }

        .log-container { overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(200,168,130,0.3) transparent; }
        .log-container::-webkit-scrollbar { width: 3px; }
        .log-container::-webkit-scrollbar-thumb { background: rgba(200,168,130,0.3); border-radius: 3px; }
        .log-entry { padding: 4px 0; font-size: 11px; color: var(--text-muted); border-bottom: 1px solid rgba(200,168,130,0.05); animation: fadeIn 0.3s ease; line-height: 1.4; }

        .confetti-piece { position: fixed; z-index: 200; pointer-events: none; animation: confettiFall linear forwards; }
        @keyframes confettiFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        .pulse-gold { animation: pulseGold 1.5s ease-in-out infinite; }
        @keyframes pulseGold {
            0%, 100% { box-shadow: 0 0 0 0 rgba(241,196,15,0.4); }
            50% { box-shadow: 0 0 0 6px rgba(241,196,15,0); }
        }

        .debug-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
            padding: 5px 12px; font-size: 10px; font-family: monospace;
            display: flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.92); border-top: 1px solid rgba(200,168,130,0.12); color: var(--text-muted);
        }
        .debug-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 3px; }
        .debug-dot.ok { background: #2ECC71; box-shadow: 0 0 5px #2ECC71; }
        .debug-dot.fail { background: #E74C3C; box-shadow: 0 0 5px #E74C3C; }
        .debug-dot.wait { background: #F39C12; box-shadow: 0 0 5px #F39C12; animation: pulseGold 1s infinite; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(200,168,130,0.25); border-radius: 4px; }

        .lobby-inner, .wait-inner { width: 100%; max-width: 420px; padding: 16px; }
        .lobby-title { font-size: clamp(28px, 8vw, 42px); }

        .game-screen-inner {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            padding: 6px; padding-bottom: 28px;
            overflow: hidden;
        }
        .players-bar {
            display: flex; gap: 6px; overflow-x: auto; padding: 4px 0;
            scrollbar-width: none; flex-shrink: 0;
        }
        .players-bar::-webkit-scrollbar { display: none; }
        .players-bar .player-badge { flex-shrink: 0; min-width: 0; }

        .board-area {
            flex: 1 1 0%; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 6px; min-height: 0; position: relative;
            overflow: hidden;
        }
        #board-canvas {
            border-radius: 10px;
            box-shadow: 0 6px 30px rgba(0,0,0,0.5), inset 0 0 40px rgba(200,168,130,0.04);
            display: block;
        }
        .dice-row {
            display: flex; align-items: center; gap: 12px;
            flex-shrink: 0; flex-wrap: wrap; justify-content: center;
        }
        .dice-info { text-align: center; flex-shrink: 0; }
        .dice-info .turn-text { font-size: clamp(11px, 2.8vw, 14px); font-weight: 700; }
        .btn-roll-game { padding: 10px 22px; font-size: 14px; }
        .btn-leave-game { font-size: 11px; padding: 6px 14px; }

        .log-panel {
            flex-shrink: 0; border-top: 1px solid rgba(200,168,130,0.1);
            margin-top: 4px;
        }
        .log-panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 5px 10px; cursor: pointer; user-select: none;
        }
        .log-panel-header .label { font-size: 10px; font-weight: 700; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
        .log-panel-header .chevron { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; }
        .log-panel-header .chevron.open { transform: rotate(180deg); }
        .log-panel-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .log-panel-body.open { max-height: 100px; }
        .log-panel-body .log-container { padding: 0 10px 6px; max-height: 94px; }

        .info-chips {
            display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
            padding: 2px 0; flex-shrink: 0;
        }
        .info-chip {
            font-size: 10px; padding: 3px 8px; border-radius: 6px;
            background: rgba(0,0,0,0.25); color: var(--text-muted);
            display: flex; align-items: center; gap: 3px; white-space: nowrap;
        }

        @media (min-width: 900px) {
            .game-screen-inner {
                flex-direction: row; align-items: stretch; padding: 12px; padding-bottom: 36px; gap: 12px;
            }
            .players-bar {
                flex-direction: column; overflow-y: auto; width: 180px; min-width: 160px;
                scrollbar-width: thin; scrollbar-color: rgba(200,168,130,0.3) transparent;
            }
            .players-bar::-webkit-scrollbar { width: 4px; }
            .players-bar::-webkit-scrollbar-thumb { background: rgba(200,168,130,0.3); border-radius: 4px; }
            .players-bar .player-badge { width: 100%; }
            .board-area { flex: 1; }
            .log-panel { border-top: none; border-left: 1px solid rgba(200,168,130,0.1); margin-top: 0; width: 200px; min-width: 170px; }
            .log-panel-body.open { max-height: 200px; }
            .log-panel-body .log-container { max-height: 194px; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div id="toast" class="toast info"></div>

    <div class="debug-bar">
        <span><span class="debug-dot wait" id="dbg-dot"></span><span id="dbg-status">Menghubungkan...</span></span>
        <span id="dbg-detail" style="opacity:0.7;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
    </div>

    <!-- ========== LOBBY ========== -->
    <div id="screen-lobby" class="screen active">
        <div class="lobby-inner">
            <div class="game-card" style="padding:clamp(20px,5vw,32px);">
                <div class="text-center" style="margin-bottom:clamp(16px,4vw,28px);">
                    <div style="font-size:clamp(40px,10vw,60px);margin-bottom:8px;">🐍</div>
                    <h1 class="fredoka lobby-title" style="color:var(--accent-gold);margin-bottom:4px;">ULAR TANGGA</h1>
                    <p style="font-size:13px;color:var(--text-muted);">Multiplayer Online By xFake</p>
                </div>
                <div style="margin-bottom:16px;">
                    <label style="display:block;font-size:13px;font-weight:700;margin-bottom:6px;color:var(--text-muted);">Nama Kamu</label>
                    <input type="text" id="input-name" class="game-input" placeholder="Masukkan nama..." maxlength="15">
                </div>
                <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px;">
                    <button class="btn-primary" style="width:100%;" id="btn-create" onclick="G.createRoom()">
                        <span class="spinner"></span><span class="btn-text"><i class="fas fa-plus"></i> Buat Ruangan</span>
                    </button>
                    <div style="display:flex;gap:8px;">
                        <input type="text" id="input-code" class="game-input" placeholder="Kode ruangan..." maxlength="6" style="text-transform:uppercase;flex:1;">
                        <button class="btn-secondary" id="btn-join" onclick="G.joinRoom()" style="white-space:nowrap;">
                            <i class="fas fa-sign-in-alt"></i> Gabung
                        </button>
                    </div>
                </div>
                <div>
                    <p style="font-size:13px;font-weight:700;margin-bottom:8px;color:var(--text-muted);"><i class="fas fa-door-open" style="margin-right:4px;"></i> Ruangan Tersedia</p>
                    <div id="room-list" class="custom-scroll" style="display:flex;flex-direction:column;gap:8px;max-height:180px;overflow-y:auto;">
                        <p style="text-align:center;font-size:13px;padding:12px 0;color:var(--text-muted);">Mencari ruangan...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== WAITING ========== -->
    <div id="screen-waiting" class="screen">
        <div class="wait-inner">
            <div class="game-card" style="padding:clamp(20px,5vw,32px);text-align:center;">
                <div style="font-size:clamp(36px,9vw,50px);margin-bottom:12px;">🎲</div>
                <h2 class="fredoka" style="font-size:clamp(20px,5vw,26px);color:var(--accent-gold);margin-bottom:6px;">Menunggu Pemain</h2>
                <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px;">
                    Kode: <span id="disp-code" style="font-weight:900;font-size:clamp(16px,4vw,20px);letter-spacing:0.15em;color:var(--text-primary);"></span>
                </p>
                <div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px;">
                    <button onclick="G.copyCode()" class="btn-secondary" style="font-size:13px;"><i class="fas fa-copy"></i> Salin</button>
                    <button onclick="G.shareCode()" class="btn-secondary" style="font-size:13px;"><i class="fas fa-share"></i> Bagikan</button>
                </div>
                <div id="wait-players" style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;"></div>
                <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
                    <button id="btn-start" class="btn-primary" onclick="G.startGame()" disabled>
                        <span class="spinner"></span><span class="btn-text"><i class="fas fa-play"></i> Mulai (0/2)</span>
                    </button>
                    <button class="btn-secondary" onclick="G.leave()"><i class="fas fa-arrow-left"></i> Kembali</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== GAME ========== -->
    <div id="screen-game" class="screen">
        <div class="game-screen-inner">
            <div class="players-bar" id="g-players"></div>
            <div class="board-area">
                <div class="info-chips">
                    <span class="info-chip"><span style="color:var(--snake-color);">🐍</span> Ular = Turun</span>
                    <span class="info-chip"><span style="color:var(--ladder-color1);">🪜</span> Tangga = Naik</span>
                    <span class="info-chip"><span style="color:var(--accent-gold);">⭐</span> Capai 100</span>
                </div>
                <canvas id="board-canvas" width="500" height="500"></canvas>
                <div class="dice-row">
                    <div class="dice-info">
                        <div class="turn-text" id="g-turn" style="color:var(--accent-gold);">Giliranmu!</div>
                        <div class="dice-container" id="dice-wrap" onclick="G.rollDice()">
                            <div class="dice" id="dice">
                                <div class="dot" data-p="1"></div><div class="dot" data-p="2"></div><div class="dot" data-p="3"></div>
                                <div class="dot" data-p="4"></div><div class="dot" data-p="5"></div><div class="dot" data-p="6"></div>
                                <div class="dot" data-p="7"></div><div class="dot" data-p="8"></div><div class="dot" data-p="9"></div>
                            </div>
                        </div>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:6px;">
                        <button id="btn-roll" class="btn-primary btn-roll-game" onclick="G.rollDice()">
                            <span class="spinner"></span><span class="btn-text"><i class="fas fa-dice"></i> Lempar</span>
                        </button>
                        <button class="btn-secondary btn-leave-game" onclick="G.leave()"><i class="fas fa-sign-out-alt"></i> Keluar</button>
                    </div>
                </div>
            </div>
            <div class="log-panel">
                <div class="log-panel-header" onclick="toggleLog()">
                    <span class="label"><i class="fas fa-scroll"></i> Log Permainan</span>
                    <i class="fas fa-chevron-up chevron" id="log-chevron"></i>
                </div>
                <div class="log-panel-body" id="log-body">
                    <div id="g-log" class="log-container"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== WINNER ========== -->
    <div id="modal-win" class="modal-overlay">
        <div class="modal-content">
            <div style="font-size:clamp(40px,10vw,60px);margin-bottom:12px;">🏆</div>
            <h2 class="fredoka" style="font-size:clamp(22px,6vw,30px);color:var(--accent-gold);margin-bottom:6px;" id="win-name">Pemenang!</h2>
            <p style="margin-bottom:20px;font-size:14px;color:var(--text-muted);">Berhasil mencapai kotak 100</p>
            <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
                <button class="btn-primary" onclick="G.playAgain()"><span class="spinner"></span><span class="btn-text"><i class="fas fa-redo"></i> Main Lagi</span></button>
                <button class="btn-secondary" onclick="G.toLobby()"><i class="fas fa-home"></i> Lobi</button>
            </div>
        </div>
    </div>

    <!-- ========== FIREBASE + GAME LOGIC ========== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import {
            getDatabase, ref, set, get, onValue, push, update, remove,
            serverTimestamp, off, onChildAdded, onDisconnect
        } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

        const firebaseConfig = {

            databaseURL: "https://ular-tangga-3dfd6-default-rtdb.asia-southeast1.firebasedatabase.app",

            storageBucket: "ular-tangga-3dfd6.firebasestorage.app",

            appId: "1:44656619695:web:21fced8a31c8777b11e45a",

        };

        /* Warna untuk tiap pemain (maks 4) */
        const COLORS = ['#E74C3C','#3498DB','#2ECC71','#F39C12'];

        /* Peta ular: dari -> ke (selalu turun) */
        const SNAKES = { 99:79, 97:82, 94:64, 83:58, 69:50, 55:29, 53:33, 42:37, 19:2, 12:9 };

        /* Peta tangga: dari -> ke (selalu naik) */
        const LADDERS = { 4:15, 18:23, 20:74, 32:45, 35:48, 40:41, 70:73, 76:85, 80:100, 90:92 };

        /* ===== State global ===== */
        let db = null, fbOk = false;
        let myId = null, myName = '', rid = null, order = [];
        let rolling = false, anim = {};
        let winnerShown = false;
        let cleanupInterval = null;
        let lastPlayers = null;
        let lastRoomSnap = null;
        let localAnimating = false;
        let prevPositions = {};

        /* ===== Inisialisasi Firebase ===== */
        try {
            const app = initializeApp(firebaseConfig);
            db = getDatabase(app);
            fbOk = true;
            dbg('ok', 'Firebase terhubung');
        } catch(e) {
            dbg('fail', 'Init gagal: ' + e.message);

        /* ===== Toggle log panel ===== */

        /* ===== Resize canvas ===== */

        /* ===== Efek konfetti saat menang ===== */
        function confetti() {
            const c = ['#E74C3C','#F1C40F','#2ECC71','#3498DB','#9B59B6','#F39C12','#1ABC9C'];
            for (let i = 0; i < 60; i++) {

                setTimeout(() => p.remove(), 5000);
            }
        }

        /* ===== Konversi nomor kotak (1-100) ke posisi grid (x, y) 0-9 ===== */
        function c2p(n) {
            n = Math.max(1, Math.min(100, n));
            const i = n - 1;
            const r = Math.floor(i / 10);
            const c = (r % 2 === 0) ? (i % 10) : (9 - (i % 10));
            return { x: c, y: (9 - r) };
        }

        /* ===== Generate kode ruangan 6 karakter ===== */
        function genCode() {
            const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let r = '';
            for (let i = 0; i < 6; i++) r += c[Math.floor(Math.random() * c.length)];
            return r;
        }

        /* ===== Utility: gelapkan/terangkan warna hex ===== */
        function shade(c, p) {
            const n = parseInt(c.replace('#', ''), 16);
            const r = Math.min(255, Math.max(0, (n >> 16) + p));
            const g = Math.min(255, Math.max(0, ((n >> 8) & 0xFF) + p));
            const b = Math.min(255, Math.max(0, (n & 0xFF) + p));
            return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        /* ===== Toggle loading state tombol ===== */
        function load(btn, on) {
            const e = document.getElementById(btn);
            if (!e) return;
            on ? e.classList.add('loading') : e.classList.remove('loading');
            e.disabled = on;
        }

        /* ===== Hapus ruangan kosong secara berkala ===== */
        async function cleanupEmptyRooms() {
            if (!db) return;
            try {
                const snap = await get(ref(db, 'rooms'));
                if (!snap.exists()) return;
                const rooms = snap.val(), toDelete = [];
                Object.entries(rooms).forEach(([code, room]) => {
                    if (!(room.players ? Object.keys(room.players).length : 0)) toDelete.push(code);
                });
                if (toDelete.length > 0) {
                    const del = {};
                    toDelete.forEach(code => { del['rooms/' + code] = null; });
                    await update(ref(db), del);
                }
            } catch (e) { console.warn('[cleanup]', e.message); }
        }
        function startCleanupTimer() {
            if (cleanupInterval) clearInterval(cleanupInterval);
            cleanupInterval = setInterval(cleanupEmptyRooms, 60000);
        }
        async function removeRoomIfEmpty(code) {
            if (!db || !code) return;
            try {
                const snap = await get(ref(db, 'rooms/' + code + '/players'));
                if (!snap.exists() || !Object.keys(snap.val()).length) await remove(ref(db, 'rooms/' + code));
            } catch (e) { console.warn('[removeIfEmpty]', e.message); }
        }

        /* ==========================================================
         *  GAMBAR PAPAN — selalu 500x500 internal
         * ========================================================== */
        function drawBoard(players) {
            const cv = document.getElementById('board-canvas');
            if (!cv) return;
            if (players) lastPlayers = players;

            const ctx = cv.getContext('2d');
            const S = 500;
            const C = S / 10;

            ctx.clearRect(0, 0, S, S);

            ctx.fillStyle = "#8B5A2B";
            ctx.fillRect(0, 0, S, S);

            ctx.strokeStyle = "rgba(90,53,20,0.15)";
            ctx.lineWidth = 1;
            for (let i = 0; i < S; i += 7) {
                ctx.beginPath();
                ctx.moveTo(0, i + Math.sin(i * 0.05) * 3);
                ctx.lineTo(S, i + Math.sin(i * 0.05 + 2) * 3);
                ctx.stroke();
            }

            for (let n = 1; n <= 100; n++) {
                const pos = c2p(n);
                const x = pos.x * C, y = pos.y * C;
                const row = 9 - pos.y;
                const col = pos.x;

                ctx.fillStyle = ((row + col) % 2 === 0) ? "#F6E5B8" : "#C98F4A";
                ctx.fillRect(x, y, C, C);

                ctx.fillStyle = "rgba(255,255,255,0.18)";
                ctx.fillRect(x + 2, y + 2, C - 4, 3);
                ctx.fillStyle = "rgba(0,0,0,0.12)";
                ctx.fillRect(x + 1, y + C - 4, C - 2, 3);

                ctx.strokeStyle = "#6A4724";
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, C, C);

                if (n === 100) {
                    ctx.fillStyle = "#FFD64A";
                    ctx.fillRect(x, y, C, C);
                    ctx.strokeStyle = "#C08A00";
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x, y, C, C);
                    ctx.font = "bold " + Math.round(C * 0.48) + "px Arial";
                    ctx.fillStyle = "#B06D00";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText("\u2605", x + C / 2, y + C / 2);
                    ctx.font = "bold " + Math.round(C * 0.26) + "px Arial";
                    ctx.textAlign = "left";
                    ctx.textBaseline = "top";
                    ctx.fillStyle = "#5A3514";
                    ctx.fillText("100", x + 4, y + 3);
                } else {
                    ctx.fillStyle = "#5A3514";
                    ctx.font = "bold " + Math.round(C * 0.26) + "px Arial";
                    ctx.textAlign = "left";
                    ctx.textBaseline = "top";
                    ctx.fillText(n, x + 4, y + 3);
                }

                if (SNAKES[n]) {
                    ctx.beginPath();
                    ctx.arc(x + C - 8, y + 8, 5, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(231,76,60,0.6)";
                    ctx.fill();
                }
                if (LADDERS[n]) {
                    ctx.beginPath();
                    ctx.arc(x + C - 8, y + 8, 5, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(74,144,217,0.6)";
                    ctx.fill();
                }
            }

            for (const [f, t] of Object.entries(LADDERS)) drawLadder(ctx, +f, +t, C);
            for (const [f, t] of Object.entries(SNAKES)) drawSnake(ctx, +f, +t, C);

            if (lastPlayers) {
                Object.entries(lastPlayers).forEach(([id, p]) => {
                    const idx = order.indexOf(id);
                    const pos = anim[id] !== undefined ? anim[id] : (p.position || 0);
                    if (pos < 1) return;
                    drawPiece(ctx, pos, idx >= 0 ? idx : 0, p.name || "P", C);
                });
            }
        }

        /* ===== Gambar satu tangga ===== */
        function drawLadder(ctx, from, to, C) {
            const s = c2p(from), e = c2p(to);
            const sx = s.x * C + C / 2, sy = s.y * C + C / 2;
            const ex = e.x * C + C / 2, ey = e.y * C + C / 2;
            const dx = ex - sx, dy = ey - sy;
            const len = Math.max(1, Math.sqrt(dx * dx + dy * dy));
            const nx = -dy / len, ny = dx / len;
            const w = C * 0.24;

            ctx.strokeStyle = "#2D8CFF";
            ctx.lineWidth = C * 0.1;
            ctx.lineCap = "round";
            ctx.beginPath(); ctx.moveTo(sx + nx * w, sy + ny * w); ctx.lineTo(ex + nx * w, ey + ny * w); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(sx - nx * w, sy - ny * w); ctx.lineTo(ex - nx * w, ey - ny * w); ctx.stroke();

            ctx.strokeStyle = "#9DD8FF";
            ctx.lineWidth = C * 0.07;
            const count = Math.max(1, Math.floor(len / (C * 0.36)));
            for (let i = 1; i < count; i++) {
                const t = i / count;
                const cx = sx + dx * t, cy = sy + dy * t;
                ctx.beginPath();
                ctx.moveTo(cx + nx * w, cy + ny * w);
                ctx.lineTo(cx - nx * w, cy - ny * w);
                ctx.stroke();
            }
        }

        /* ===== Gambar satu ular ===== */
        function drawSnake(ctx, from, to, C) {
            const s = c2p(from), e = c2p(to);
            const sx = s.x * C + C / 2, sy = s.y * C + C / 2;
            const ex = e.x * C + C / 2, ey = e.y * C + C / 2;
            const dx = ex - sx, dy = ey - sy;
            const len = Math.max(1, Math.sqrt(dx * dx + dy * dy));
            const nx = -dy / len, ny = dx / len;
            const amp = C * 0.2;

            ctx.beginPath();
            for (let i = 0; i <= 40; i++) {
                const t = i / 40;
                const x = sx + dx * t + Math.sin(t * Math.PI * 5) * nx * amp;
                const y = sy + dy * t + Math.sin(t * Math.PI * 5) * ny * amp;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.strokeStyle = "#2D8B4E";
            ctx.lineWidth = C * 0.22;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.stroke();

            ctx.beginPath();
            for (let i = 0; i <= 40; i++) {
                const t = i / 40;
                const x = sx + dx * t + Math.sin(t * Math.PI * 5) * nx * amp * 0.8 - C * 0.04;
                const y = sy + dy * t + Math.sin(t * Math.PI * 5) * ny * amp * 0.8 - C * 0.04;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.strokeStyle = "#63D97B";
            ctx.lineWidth = C * 0.05;
            ctx.stroke();

            for (let i = 2; i < 38; i += 2) {
                const t = i / 40;
                ctx.beginPath();
                ctx.arc(
                    sx + dx * t + Math.sin(t * Math.PI * 5) * nx * amp,
                    sy + dy * t + Math.sin(t * Math.PI * 5) * ny * amp,
                    C * 0.04, 0, Math.PI * 2
                );
                ctx.fillStyle = "#9FF29F";
                ctx.fill();
            }

            const hr = C * 0.2;
            ctx.beginPath();
            ctx.arc(sx, sy, hr, 0, Math.PI * 2);
            ctx.fillStyle = "#1B6D34";
            ctx.fill();

            ctx.beginPath();
            ctx.arc(sx - hr * 0.3, sy - hr * 0.3, hr * 0.2, 0, Math.PI * 2);
            ctx.fillStyle = "#FFF";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(sx + hr * 0.3, sy - hr * 0.3, hr * 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(sx - hr * 0.3, sy - hr * 0.3, hr * 0.1, 0, Math.PI * 2);
            ctx.arc(sx + hr * 0.3, sy - hr * 0.3, hr * 0.1, 0, Math.PI * 2);
            ctx.fillStyle = "#000";
            ctx.fill();

            ctx.strokeStyle = "#FF3B5C";
            ctx.lineWidth = C * 0.03;
            ctx.beginPath();
            ctx.moveTo(sx, sy + hr * 0.7);
            ctx.lineTo(sx - hr * 0.3, sy + hr * 1.3);
            ctx.moveTo(sx, sy + hr * 0.7);
            ctx.lineTo(sx + hr * 0.3, sy + hr * 1.3);
            ctx.stroke();

            const tx = ex - dx / len * C * 0.2, ty = ey - dy / len * C * 0.2;
            ctx.beginPath();
            ctx.moveTo(ex, ey);
            ctx.lineTo(tx + nx * C * 0.08, ty + ny * C * 0.08);
            ctx.lineTo(tx - nx * C * 0.08, ty - ny * C * 0.08);
            ctx.closePath();
            ctx.fillStyle = "#2D8B4E";
            ctx.fill();
        }

        /* ===== Gambar bidak pemain ===== */
        function drawPiece(ctx, cell, idx, name, C) {
            const pos = c2p(cell);
            const px = pos.x * C + C / 2, py = pos.y * C + C / 2;
            const color = COLORS[idx % 4];
            const r = C * 0.18;

            const offs = [
                { x: -0.16, y: -0.16 }, { x: 0.16, y: -0.16 },
                { x: -0.16, y: 0.16 },  { x: 0.16, y: 0.16 }
            ];
            const o = offs[idx % 4];
            const fx = px + o.x * C, fy = py + o.y * C;

            ctx.beginPath();
            ctx.arc(fx + C * 0.02, fy + C * 0.04, r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(fx, fy, r, 0, Math.PI * 2);
            const gr = ctx.createRadialGradient(fx - r * 0.3, fy - r * 0.3, r * 0.2, fx, fy, r);
            gr.addColorStop(0, '#fff');
            gr.addColorStop(0.4, color);
            gr.addColorStop(1, shade(color, -30));
            ctx.fillStyle = gr;
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.fillStyle = '#fff';
            ctx.font = 'bold ' + Math.round(r * 1.1) + 'px Nunito,sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText((name || 'P').charAt(0).toUpperCase(), fx, fy + 1);
        }

        /* ===== Animasi gerak bidak step-by-step ===== */
        function animateMove(pid, from, to, players) {
            return new Promise(res => {
                if (from === to) { res(); return; }
                const step = from < to ? 1 : -1;
                let cur = from;
                const iv = setInterval(() => {
                    cur += step;
                    anim[pid] = cur;
                    drawBoard(players);
                    if (cur === to) {
                        clearInterval(iv);
                        delete anim[pid];
                        drawBoard(players);
                        res();
                    }
                }, 100);
            });
        }

        /* ===== Daftar ruangan di lobby ===== */
        function listenList() {
            if (!db) return;
            try { off(ref(db, 'rooms')); } catch(e) {}
            const el = document.getElementById('room-list');
            onValue(ref(db, 'rooms'), snap => {
                if (!snap.exists()) {
                    el.innerHTML = '<p style="text-align:center;font-size:13px;padding:12px 0;color:var(--text-muted);">Belum ada ruangan</p>';
                    return;
                }
                const rooms = snap.val();
                const items = [];
                Object.entries(rooms).forEach(([code, room]) => {
                    const pc = room.players ? Object.keys(room.players).length : 0;
                    if (room.status === 'waiting' && pc < 4) {
                        items.push({ code, pc, names: room.players ? Object.values(room.players).map(p => p.name).join(', ') : '' });
                    }
                });
                if (!items.length) {
                    el.innerHTML = '<p style="text-align:center;font-size:13px;padding:12px 0;color:var(--text-muted);">Belum ada ruangan</p>';
                    return;
                }
                el.innerHTML = '';
                items.forEach(r => {
                    const d = document.createElement('div');
                    d.className = 'room-item';
                    d.innerHTML = `
                        <div>
                            <div style="font-weight:800;font-size:14px;letter-spacing:0.08em;color:var(--accent-gold);">${r.code}</div>
                            <div style="font-size:11px;color:var(--text-muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;">${r.names}</div>
                        </div>
                        <div style="text-align:right;flex-shrink:0;">
                            <div style="font-size:12px;font-weight:700;">${r.pc}/4</div>
                            <div style="font-size:10px;color:var(--text-muted);">pemain</div>
                        </div>`;
                    d.onclick = () => {
                        document.getElementById('input-code').value = r.code;
                        G.joinRoom(r.code);
                    };
                    el.appendChild(d);
                });
            }, err => { console.warn('[list]', err.message); });
        }

        /* ===== Buat Ruangan ===== */
        async function createRoom() {
            if (!fbOk) { toast('Firebase belum terhubung!', 'error', 6000); return; }
            const name = document.getElementById('input-name').value.trim();
            if (!name) { toast('Masukkan namamu dulu!', 'warning'); return; }
            myName = name;
            myId = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
            const code = genCode();
            rid = code;
            load('btn-create', true);
            dbg('wait', 'Membuat ruangan...');
            try {
                await set(ref(db, 'rooms/' + code), {
                    createdAt: serverTimestamp(), status: 'waiting',
                    currentPlayerIndex: 0, lastDice: 1,
                    playerOrder: null, winner: null,
                    players: {
                        [myId]: { name: myName, position: 0, joinedAt: serverTimestamp() }
                    },
                    log: {}
                });
                onDisconnect(ref(db, 'rooms/' + code + '/players/' + myId)).remove();
                dbg('ok', 'Ruangan ' + code + ' dibuat');
                toast('Ruangan dibuat! Kode: ' + code, 'success');
                show('screen-waiting');
                document.getElementById('disp-code').textContent = code;
                winnerShown = false;
                prevPositions = {};
                listenRoom(code);
            } catch (e) {
                dbg('fail', 'Gagal: ' + e.message);
                toast('GAGAL buat ruangan: ' + e.message, 'error', 8000);
                console.error(e);
            } finally {
                load('btn-create', false);
            }
        }

        /* ===== Gabung Ruangan ===== */
        async function joinRoom(code) {
            if (!fbOk) { toast('Firebase belum terhubung!', 'error', 6000); return; }
            if (!code) code = document.getElementById('input-code').value.trim().toUpperCase();
            if (!code) { toast('Masukkan kode ruangan!', 'warning'); return; }
            const name = document.getElementById('input-name').value.trim();
            if (!name) { toast('Masukkan namamu dulu!', 'warning'); return; }
            myName = name;
            myId = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
            load('btn-join', true);
            dbg('wait', 'Gabung ke ' + code + '...');
            try {
                const snap = await get(ref(db, 'rooms/' + code));
                if (!snap.exists()) {
                    toast('Ruangan "' + code + '" tidak ditemukan!', 'error');
                    load('btn-join', false);
                    return;
                }
                const room = snap.val();
                if (room.status !== 'waiting') {
                    toast('Permainan sudah dimulai!', 'warning');
                    load('btn-join', false);
                    return;
                }
                if (Object.keys(room.players || {}).length >= 4) {
                    toast('Ruangan penuh!', 'warning');
                    load('btn-join', false);
                    return;
                }
                await set(ref(db, 'rooms/' + code + '/players/' + myId), {
                    name: myName, position: 0, joinedAt: serverTimestamp()
                });
                onDisconnect(ref(db, 'rooms/' + code + '/players/' + myId)).remove();
                rid = code;
                dbg('ok', 'Bergabung ke ' + code);
                toast('Berhasil gabung!', 'success');
                show('screen-waiting');
                document.getElementById('disp-code').textContent = code;
                winnerShown = false;
                prevPositions = {};
                listenRoom(code);
            } catch (e) {
                dbg('fail', 'Gagal: ' + e.message);
                toast('GAGAL gabung: ' + e.message, 'error', 8000);
                console.error(e);
            } finally {
                load('btn-join', false);
            }
        }

        /* ===== Keluar dari ruangan ===== */
        async function leave() {
            if (rid && myId) {
                try {
                    onDisconnect(ref(db, 'rooms/' + rid + '/players/' + myId)).cancel();
                    await remove(ref(db, 'rooms/' + rid + '/players/' + myId));
                    await removeRoomIfEmpty(rid);
                } catch (e) { console.warn(e); }
            }
            cleanup();
            show('screen-lobby');
            listenList();
        }

        function cleanup() {
            if (rid) {
                try { onDisconnect(ref(db, 'rooms/' + rid + '/players/' + myId)).cancel(); } catch (e) {}
                try { off(ref(db, 'rooms/' + rid)); } catch (e) {}
                try { off(ref(db, 'rooms/' + rid + '/log')); } catch (e) {}
            }
            rid = null;
            order = [];
            lastPlayers = null;
            lastRoomSnap = null;
            prevPositions = {};
            anim = {};
            winnerShown = false;
            localAnimating = false;
            rolling = false;
            document.getElementById('g-log').innerHTML = '';
            document.getElementById('modal-win').classList.remove('active');
        }

        /* ===== Mulai Game ===== */
        async function startGame() {
            if (!rid) return;
            load('btn-start', true);
            dbg('wait', 'Memulai...');
            try {
                const snap = await get(ref(db, 'rooms/' + rid + '/players'));
                const players = snap.val();
                const ids = Object.keys(players);
                if (ids.length < 2) {
                    toast('Minimal 2 pemain!', 'warning');
                    load('btn-start', false);
                    return;
                }
                for (let i = ids.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [ids[i], ids[j]] = [ids[j], ids[i]];
                }
                const ordered = {};
                ids.forEach((id, i) => {
                    ordered[id] = { ...players[id], position: 0, order: i };
                });

                prevPositions = {};
                ids.forEach(id => { prevPositions[id] = 0; });

                await set(ref(db, 'rooms/' + rid), {
                    status: 'playing', currentPlayerIndex: 0, lastDice: 1,
                    playerOrder: ids, winner: null, players: ordered, log: {}
                });
                await push(ref(db, 'rooms/' + rid + '/log'), {
                    msg: 'Permainan dimulai! Pemain: ' + ids.map(id => players[id].name).join(', '),
                    time: serverTimestamp()
                });
                dbg('ok', 'Game dimulai');
            } catch (e) {
                toast('Gagal mulai: ' + e.message, 'error');
                dbg('fail', 'Gagal: ' + e.message);
            } finally {
                load('btn-start', false);
            }
        }

        /* ===== Listener ruangan (waiting / playing / finished) ===== */
        function listenRoom(code) {
            if (rid) {
                try { off(ref(db, 'rooms/' + rid)); } catch (e) {}
                try { off(ref(db, 'rooms/' + rid + '/log')); } catch (e) {}
            }
            rid = code;
            dbg('wait', 'Mendengarkan ' + code + '...');

            onValue(ref(db, 'rooms/' + code), async snap => {
                if (!snap.exists()) {
                    toast('Ruangan ditutup', 'error');
                    cleanup();
                    show('screen-lobby');
                    listenList();
                    return;
                }
                const room = snap.val();
                lastRoomSnap = room;
                dbg('ok', 'Aktif [' + room.status + ']');

                const pCount = room.players ? Object.keys(room.players).length : 0;
                if (pCount === 0) {
                    await removeRoomIfEmpty(code);
                    toast('Ruangan kosong — dihapus', 'warning');
                    cleanup();
                    show('screen-lobby');
                    listenList();
                    return;
                }

                if (room.status === 'waiting') {
                    updateWait(room);
                } else if (room.status === 'playing') {
                    show('screen-game');
                    await updateGame(room);
                } else if (room.status === 'finished') {
                    show('screen-game');
                    await updateGame(room);
                    if (room.winner && !winnerShown) {
                        winnerShown = true;
                        const wp = room.players[room.winner];
                        document.getElementById('win-name').textContent = (wp ? wp.name : 'Pemenang') + ' Menang!';
                        document.getElementById('modal-win').classList.add('active');
                        confetti();
                    }
                }
            }, err => {
                dbg('fail', 'Listener: ' + err.message);
                console.error(err);
            });

            try { off(ref(db, 'rooms/' + code + '/log')); } catch (e) {}
            document.getElementById('g-log').innerHTML = '';
            onChildAdded(ref(db, 'rooms/' + code + '/log'), snap => {
                const d = snap.val();
                if (d) addLog(d.msg);
            });
        }

        /* ===== Update tampilan layar menunggu ===== */
        function updateWait(room) {
            const players = room.players || {};
            const c = document.getElementById('wait-players');
            c.innerHTML = '';
            let i = 0;
            Object.entries(players).forEach(([id, p]) => {
                const me = id === myId;
                const d = document.createElement('div');
                d.className = 'player-badge' + (me ? ' current' : '');
                d.innerHTML = `
                    <div class="player-avatar" style="background:${COLORS[i % 4]}">${(p.name || 'P').charAt(0).toUpperCase()}</div>
                    <div style="text-align:left;">
                        <div style="font-weight:700;font-size:14px;">${p.name}${me ? ' <span style="color:var(--accent-gold);font-size:11px;">(kamu)</span>' : ''}</div>
                        <div style="font-size:12px;color:var(--text-muted);">Pemain ${i + 1}</div>
                    </div>`;
                c.appendChild(d);
                i++;
            });
            const cnt = Object.keys(players || {}).length;
            const btn = document.getElementById('btn-start');
            const firstId = Object.keys(players)[0];
            const isHost = firstId === myId;
            btn.disabled = cnt < 2 || !isHost;
            btn.querySelector('.btn-text').innerHTML = `<i class="fas fa-play"></i> Mulai (${cnt}/2)`;
            if (!isHost && cnt < 2) {
                btn.querySelector('.btn-text').innerHTML = `<i class="fas fa-play"></i> Menunggu host (${cnt}/2)`;
            }
        }

        /* ===== Update tampilan game ===== */
        async function updateGame(room) {
            const players = room.players || {};
            order = room.playerOrder || Object.keys(players);
            const cIdx = room.currentPlayerIndex || 0;
            const cId = order[cIdx] || order[0];
            const isMy = cId === myId;
            const cp = players[cId];

            /* Simpan posisi lama sebelum update */
            if (lastPlayers) {
                Object.entries(lastPlayers).forEach(([id, p]) => {
                    prevPositions[id] = p.position || 0;
                });
            }

            /* Update bar pemain */
            const c = document.getElementById('g-players');
            c.innerHTML = '';
            order.forEach((id, i) => {
                const p = players[id];
                if (!p) return;
                const me = id === myId;
                const cur = id === cId;
                const d = document.createElement('div');
                d.className = 'player-badge' + (cur ? ' current pulse-gold' : '');
                d.innerHTML = `
                    <div class="player-avatar" style="background:${COLORS[i % 4]};${cur ? 'border:2px solid var(--accent-gold);' : ''}">${(p.name || 'P').charAt(0).toUpperCase()}</div>
                    <div style="text-align:left;min-width:0;overflow:hidden;">
                        <div style="font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}${me ? ' <span style="color:var(--accent-gold);font-size:10px;">(kamu)</span>' : ''}</div>
                        <div style="font-size:11px;color:var(--text-muted);">Pos: ${p.position || 0}</div>
                    </div>
                    ${cur ? '<i class="fas fa-dice" style="color:var(--accent-gold);font-size:12px;flex-shrink:0;"></i>' : ''}`;
                c.appendChild(d);
            });

            /* Update teks giliran */
            const turnEl = document.getElementById('g-turn');
            if (room.status === 'finished') {
                turnEl.textContent = 'Permainan selesai!';
                turnEl.style.color = '#2ECC71';
            } else if (isMy) {
                turnEl.textContent = 'Giliranmu!';
                turnEl.style.color = 'var(--accent-gold)';
            } else {
                turnEl.textContent = 'Giliran ' + (cp ? cp.name : '...');
                turnEl.style.color = 'var(--text-muted)';
            }

            if (room.lastDice) dice(room.lastDice);

            /* Aktif/nonaktifkan tombol */
            const btnRoll = document.getElementById('btn-roll');
            const diceWrap = document.getElementById('dice-wrap');
            const canRoll = isMy && !rolling && !localAnimating && room.status === 'playing';
            btnRoll.disabled = !canRoll;
            diceWrap.style.opacity = canRoll ? '1' : '0.5';
            diceWrap.style.pointerEvents = canRoll ? 'auto' : 'none';

            /* Animasi pergerakan pemain lain */
            if (!localAnimating && lastPlayers) {
                const animQueue = [];
                for (const id of order) {
                    const oldPos = prevPositions[id] !== undefined ? prevPositions[id] : 0;
                    const newPos = (players[id] && players[id].position) || 0;
                    if (oldPos !== newPos && !(oldPos === 0 && newPos === 0)) {
                        if (id !== myId) {
                            animQueue.push(animateMove(id, oldPos, newPos, players));
                        }
                    }
                }
                if (animQueue.length > 0) {
                    await Promise.all(animQueue);
                }
            }

            drawBoard(players);
        }

        /* ============================================================
         *  ★ FIX UTAMA: rollDice — urutan benar:
         *    1. Hitung posisi dadu
         *    2. Proses TANGGA dulu (bisa ke 100)
         *    3. Cek MENANG (baik langsung atau via tangga)
         *    4. Proses ULAR (tidak bisa ke 100)
         *    5. Ganti giliran
         * ============================================================ */
        async function rollDice() {
            if (!rid || !myId || rolling || localAnimating) return;

            const room = lastRoomSnap;
            if (!room || room.status !== 'playing') return;

            const players = room.players || {};
            order = room.playerOrder || Object.keys(players);
            const cIdx = room.currentPlayerIndex || 0;
            const cId = order[cIdx];
            if (cId !== myId) {
                toast('Bukan giliranmu!', 'warning');
                return;
            }

            rolling = true;
            localAnimating = true;
            load('btn-roll', true);

            /* Animasi dadu */
            const diceEl = document.getElementById('dice');
            diceEl.classList.add('rolling');
            let rollCount = 0;
            const rollIv = setInterval(() => {
                dice(Math.floor(Math.random() * 6) + 1);
                rollCount++;
            }, 80);

            await new Promise(r => setTimeout(r, 700));
            clearInterval(rollIv);
            diceEl.classList.remove('rolling');

            const result = Math.floor(Math.random() * 6) + 1;
            dice(result);

            const cp = players[myId];
            const fromPos = cp.position || 0;
            let toPos = fromPos + result;

            /* Set posisi lama supaya listener tidak dobel-animasi */
            prevPositions[myId] = fromPos;

            /* Jika melebihi 100: tidak bergerak */
            if (toPos > 100) {
                await push(ref(db, 'rooms/' + rid + '/log'), {
                    msg: `${cp.name} melempar ${result} — terlalu besar! Tetap di posisi ${fromPos}.`,
                    time: serverTimestamp()
                });
                const nextIdx = (cIdx + 1) % order.length;
                await update(ref(db, 'rooms/' + rid), {
                    lastDice: result,
                    currentPlayerIndex: nextIdx
                });
                rolling = false;
                localAnimating = false;
                load('btn-roll', false);
                return;
            }

            /* Tulis posisi baru & dadu ke Firebase */
            await update(ref(db, 'rooms/' + rid), {
                ['players/' + myId + '/position']: toPos,
                lastDice: result
            });

            /* Animasi gerak bidak langkah demi langkah */
            await animateMove(myId, fromPos, toPos, { ...players, [myId]: { ...cp, position: toPos } });

            /* ★ PROSES TANGGA DAHULU (bisa mengarah ke 100) */
            if (LADDERS[toPos]) {
                const ladderTo = LADDERS[toPos];
                await push(ref(db, 'rooms/' + rid + '/log'), {
                    msg: `${cp.name} melempar ${result}, dari ${fromPos} ke ${toPos}. NAIK TANGGA! Ke ${ladderTo}!`,
                    time: serverTimestamp()
                });
                await new Promise(r => setTimeout(r, 400));
                await animateMove(myId, toPos, ladderTo, { ...players, [myId]: { ...cp, position: ladderTo } });
                prevPositions[myId] = ladderTo;
                await update(ref(db, 'rooms/' + rid), {
                    ['players/' + myId + '/position']: ladderTo
                });
                toPos = ladderTo;
            }

            /* ★ CEK MENANG: setelah tangga diproses, apakah toPos === 100? */
            if (toPos === 100) {
                await update(ref(db, 'rooms/' + rid), {
                    status: 'finished',
                    winner: myId
                });
                await push(ref(db, 'rooms/' + rid + '/log'), {
                    msg: `${cp.name} melempar ${result} dan mencapai kotak 100! MENANG!`,
                    time: serverTimestamp()
                });
                rolling = false;
                localAnimating = false;
                load('btn-roll', false);
                return;
            }

            /* ★ PROSES ULAR (tidak bisa ke 100 karena semua ular turun) */
            if (SNAKES[toPos]) {
                const snakeTo = SNAKES[toPos];
                await push(ref(db, 'rooms/' + rid + '/log'), {
                    msg: `${cp.name} melempar ${result}, dari ${fromPos} ke ${toPos}. DIGIGIT ULAR! Turun ke ${snakeTo}!`,
                    time: serverTimestamp()
                });
                await new Promise(r => setTimeout(r, 400));
                await animateMove(myId, toPos, snakeTo, { ...players, [myId]: { ...cp, position: snakeTo } });
                prevPositions[myId] = snakeTo;
                await update(ref(db, 'rooms/' + rid), {
                    ['players/' + myId + '/position']: snakeTo
                });
                toPos = snakeTo;
            }

            /* Gerak normal tanpa ular/tangga — log pergerakan */
            if (!LADDERS[fromPos + result] && !SNAKES[fromPos + result]) {
                await push(ref(db, 'rooms/' + rid + '/log'), {
                    msg: `${cp.name} melempar ${result}, dari ${fromPos} ke ${toPos}.`,
                    time: serverTimestamp()
                });
            }

            /* Pindah giliran ke pemain berikutnya */
            const nextIdx = (cIdx + 1) % order.length;
            await update(ref(db, 'rooms/' + rid), {
                currentPlayerIndex: nextIdx
            });

            rolling = false;
            localAnimating = false;
            load('btn-roll', false);
        }

        /* ===== Salin kode ruangan ===== */
        async function copyCode() {
            const code = document.getElementById('disp-code').textContent;
            if (!code) return;
            try {
                await navigator.clipboard.writeText(code);
                toast('Kode disalin!', 'success');
            } catch (e) {
                const ta = document.createElement('textarea');
                ta.value = code;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                toast('Kode disalin!', 'success');
            }
        }

        /* ===== Bagikan kode via Web Share API ===== */
        async function shareCode() {
            const code = document.getElementById('disp-code').textContent;
            if (!code) return;
            const text = `Ayo main Ular Tangga! Gabung dengan kode: ${code}`;
            if (navigator.share) {
                try {
                    await navigator.share({ title: 'Ular Tangga Online', text: text });
                } catch (e) {}
            } else {
                await copyCode();
                toast('Kode disalin ke clipboard!', 'info');
            }
        }

        /* ===== Main lagi — reset ruangan yang sama ===== */
        async function playAgain() {
            if (!rid) return;
            document.getElementById('modal-win').classList.remove('active');
            winnerShown = false;
            localAnimating = false;
            rolling = false;
            load('btn-roll', false);

            try {
                const snap = await get(ref(db, 'rooms/' + rid + '/players'));
                const players = snap.val();
                if (!players || !Object.keys(players).length) {
                    toast('Tidak ada pemain', 'error');
                    leave();
                    return;
                }
                const ids = Object.keys(players);
                for (let i = ids.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [ids[i], ids[j]] = [ids[j], ids[i]];
                }
                const ordered = {};
                ids.forEach((id, i) => {
                    ordered[id] = { ...players[id], position: 0, order: i };
                });

                prevPositions = {};
                ids.forEach(id => { prevPositions[id] = 0; });
                anim = {};

                await set(ref(db, 'rooms/' + rid), {
                    status: 'playing', currentPlayerIndex: 0, lastDice: 1,
                    playerOrder: ids, winner: null, players: ordered, log: {}
                });
                await push(ref(db, 'rooms/' + rid + '/log'), {
                    msg: 'Ronde baru! Pemain: ' + ids.map(id => ordered[id].name).join(', '),
                    time: serverTimestamp()
                });
                toast('Ronde baru dimulai!', 'success');
            } catch (e) {
                toast('Gagal mulai lagi: ' + e.message, 'error');
                console.error(e);
            }
        }

        /* ===== Kembali ke lobby ===== */
        function toLobby() {
            document.getElementById('modal-win').classList.remove('active');
            leave();
        }

        /* ===== Expose fungsi ke global scope ===== */
        window.G = {
            createRoom, joinRoom, leave, startGame,
            rollDice, copyCode, shareCode, playAgain, toLobby
        };

        /* ===== Inisialisasi awal ===== */
        dice(1);
        listenList();
        startCleanupTimer();

        const savedName = localStorage.getItem('ut_name');
        if (savedName) {
            document.getElementById('input-name').value = savedName;
        }
        document.getElementById('input-name').addEventListener('input', (e) => {
            localStorage.setItem('ut_name', e.target.value);
        });

        document.getElementById('input-code').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') G.joinRoom();
        });
        document.getElementById('input-name').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('input-code').focus();
        });
    </script>
</body>
</html>
